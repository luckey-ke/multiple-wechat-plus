<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>微信多开 Plus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f5;--card:#fff;--card-border:#e5e5e5;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --green:#34c759;--red:#ff3b30;--blue:#007aff;
  --blue-hover:#0056b3;--yellow:#ff9500;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --radius:10px;
}
body{font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);padding:10px;min-height:100vh}

/* ===== 顶部配置栏 ===== */
.config-bar{display:flex;gap:8px;margin-bottom:10px}
.config-item{flex:1;background:var(--card);border-radius:var(--radius);padding:10px 12px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;cursor:pointer;
  border:1.5px solid transparent;transition:border .2s}
.config-item:hover{border-color:var(--blue)}
.config-item .icon{font-size:16px}
.config-item .info{flex:1;min-width:0}
.config-item .label{font-size:11px;color:var(--text2)}
.config-item .value{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.config-item.ok .value{color:var(--green)}
.config-item.warn .value{color:var(--red)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green)}
.status-dot.warn{background:var(--red)}

/* ===== 快捷操作栏 ===== */
.action-bar{display:flex;gap:6px;margin-bottom:10px}
.action-btn{flex:1;height:36px;border:none;border-radius:8px;font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .15s;color:#fff}
.action-btn.primary{background:var(--blue)}
.action-btn.primary:hover{background:var(--blue-hover)}
.action-btn.primary:active{transform:scale(.97)}
.action-btn.secondary{background:var(--card);color:var(--text);box-shadow:var(--shadow);border:1px solid var(--card-border)}
.action-btn.secondary:hover{background:#f0f0f0}
.action-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ===== 账号区头部 ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:14px;font-weight:600}
.section-count{font-size:12px;color:var(--text2)}

/* ===== 空状态 ===== */
.empty{text-align:center;padding:30px 16px;color:var(--text3)}
.empty .icon{font-size:36px;margin-bottom:8px}
.empty .msg{font-size:13px}

/* ===== 账号卡片 ===== */
.accounts{display:flex;flex-direction:column;gap:6px}
.account-card{background:var(--card);border-radius:var(--radius);padding:10px 12px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;
  border:1.5px solid transparent;transition:all .2s}
.account-card:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(0,122,255,.12)}
.account-card.starting{opacity:.6;pointer-events:none}
.avatar{width:40px;height:40px;border-radius:50%;background:#e8e8ed;flex-shrink:0;
  object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:18px;color:#c7c7cc}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.account-info{flex:1;min-width:0}
.account-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px}
.account-name .online-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.account-name .online-dot.on{background:var(--green)}
.account-name .online-dot.off{background:#d1d1d6}
.account-meta{font-size:11px;color:var(--text2);margin-top:2px}
.account-actions{display:flex;gap:4px;flex-shrink:0}
.act-btn{height:28px;padding:0 10px;border:none;border-radius:6px;font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
.act-btn.launch{background:var(--blue);color:#fff}
.act-btn.launch:hover{background:var(--blue-hover)}
.act-btn.launch:active{transform:scale(.96)}
.act-btn.icon-btn{width:28px;padding:0;justify-content:center;background:#f2f2f7;color:var(--text2)}
.act-btn.icon-btn:hover{background:#e5e5ea}
.act-btn:disabled{opacity:.4;cursor:not-allowed}

/* ===== 排序按钮组 ===== */
.reorder-group{display:flex;flex-direction:column;gap:1px}
.reorder-group .act-btn{width:22px;height:18px;border-radius:3px;font-size:10px;padding:0}

/* ===== Toast ===== */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(0,0,0,.78);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== 加载动画 ===== */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>

<!-- 配置栏 -->
<div class="config-bar" id="configBar"></div>

<!-- 快捷操作 -->
<div class="action-bar">
  <button class="action-btn primary" onclick="doNewWx()">➕ 新建多开</button>
  <button class="action-btn secondary" onclick="doSave()">💾 保存当前</button>
  <button class="action-btn secondary" onclick="doRefresh()">🔄 刷新</button>
</div>

<!-- 账号列表 -->
<div class="section-header">
  <span class="section-title">👥 我的账号</span>
  <span class="section-count" id="accountCount"></span>
</div>
<div id="accountList"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = window.wechatAPI;

// ========== Toast ==========
let toastTimer;
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ========== 配置栏 ==========
function renderConfigBar() {
  const status = API.getConfigStatus();
  const bar = document.getElementById('configBar');

  bar.innerHTML = `
    <div class="config-item ${status.handleInstalled ? 'ok' : 'warn'}" onclick="doDownloadHandle()">
      <div class="status-dot ${status.handleInstalled ? 'ok' : 'warn'}"></div>
      <div class="icon">${status.handleInstalled ? '🛡️' : '📥'}</div>
      <div class="info">
        <div class="label">handle.exe</div>
        <div class="value">${status.handleInstalled ? '已安装' : '未安装，点击下载'}</div>
      </div>
    </div>
    <div class="config-item ${status.pathSet ? 'ok' : 'warn'}" onclick="doSetPath()">
      <div class="status-dot ${status.pathSet ? 'ok' : 'warn'}"></div>
      <div class="icon">📂</div>
      <div class="info">
        <div class="label">微信文档路径</div>
        <div class="value">${status.pathSet ? '已设置' : '未设置，点击选择'}</div>
      </div>
    </div>`;
}

// ========== 账号列表 ==========
let busy = false;

async function renderAccounts() {
  const container = document.getElementById('accountList');
  const countEl = document.getElementById('accountCount');

  let accounts;
  try {
    accounts = await API.getAccountList();
  } catch (e) {
    container.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div class="msg">${e.message}</div></div>`;
    countEl.textContent = '';
    return;
  }

  if (accounts === null) {
    container.innerHTML = `<div class="empty"><div class="icon">⚙️</div><div class="msg">请先完成上方配置</div></div>`;
    countEl.textContent = '';
    return;
  }

  if (accounts.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">💬</div><div class="msg">还没有保存的账号<br>点击「新建多开」扫码登录后点「保存当前」</div></div>`;
    countEl.textContent = '';
    return;
  }

  countEl.textContent = accounts.length + ' 个账号';
  container.innerHTML = '<div class="accounts">' + accounts.map((acc, i) => {
    const isOnline = acc.isLogin;
    const avatarContent = acc.logo ? `<img src="file:///${acc.logo.replace(/\\/g,'/')}" onerror="this.parentElement.innerHTML='👤'">` : '👤';
    return `
    <div class="account-card ${busy ? 'starting' : ''}" data-id="${acc.id}">
      <div class="avatar">${avatarContent}</div>
      <div class="account-info">
        <div class="account-name">
          <span class="online-dot ${isOnline ? 'on' : 'off'}"></span>
          ${acc.name || acc.id}
        </div>
        <div class="account-meta">${acc.id}${isOnline ? ' · 在线' : ''}</div>
      </div>
      <div class="account-actions">
        <button class="act-btn launch" onclick="doLaunch(this,'${acc.id}')" ${busy?'disabled':''}>
          ${busy ? '<span class="spinner"></span>' : '🚀 启动'}
        </button>
        <div class="reorder-group">
          <button class="act-btn icon-btn" onclick="doMoveUp('${acc.id}')" ${i===0?'disabled':''} title="上移">▲</button>
          <button class="act-btn icon-btn" onclick="doMoveDown('${acc.id}')" ${i===accounts.length-1?'disabled':''} title="下移">▼</button>
        </div>
        <button class="act-btn icon-btn" onclick="doDelete('${acc.id}')" title="删除" ${busy?'disabled':''}>🗑️</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

// ========== 操作 ==========
function findAccount(id) {
  // 从已渲染的卡片中获取数据
  return API.getAccountList().then(list => list ? list.find(a => a.id === id) : null);
}

async function doNewWx() {
  if (busy) return;
  busy = true;
  renderAccounts();
  const r = await API.startWx(null);
  busy = false;
  if (r.success) toast(r.message + '，请扫码登录后点「保存当前」');
  else toast(r.message, 3000);
  if (r.configError) renderConfigBar();
  renderAccounts();
}

async function doLaunch(btn, accountId) {
  if (busy) return;
  busy = true;
  renderAccounts();

  const accounts = await API.getAccountList();
  const acc = accounts ? accounts.find(a => a.id === accountId) : null;
  const r = await API.startWx(acc);
  busy = false;
  if (r.success) toast('✅ ' + r.message);
  else toast('❌ ' + r.message, 3000);
  if (r.configError) renderConfigBar();
  renderAccounts();
}

async function doSave() {
  if (busy) return;
  const r = await API.saveWxData();
  if (r.success) { toast('✅ ' + r.message); renderAccounts(); }
  else toast('❌ ' + r.message, 3000);
}

async function doRefresh() {
  await renderConfigBar();
  await renderAccounts();
  toast('已刷新');
}

function doMoveUp(id) { API.moveUp(id); renderAccounts(); }
function doMoveDown(id) { API.moveDown(id); renderAccounts(); }

async function doDelete(id) {
  const result = utools.showMessageBox({
    type: 'warning', title: '确认删除',
    message: '确定要删除此账号吗？\n此操作不可恢复。',
    buttons: ['取消', '确认删除']
  });
  if (result !== 1) return;
  const ok = await API.deleteAccount(id);
  if (ok) { toast('已删除'); renderAccounts(); }
}

async function doDownloadHandle() {
  toast('正在下载 handle.exe...');
  const r = await API.downloadHandle();
  if (r.success) { toast('✅ handle.exe ' + r.message); renderConfigBar(); }
  else toast('❌ 下载失败：' + r.message, 3000);
}

function doSetPath() {
  try {
    const dialog = require('electron').remote.dialog;
    const paths = dialog.showOpenDialogSync({
      title: '选择 xwechat_files 文件夹',
      properties: ['openDirectory'],
      defaultPath: utools.getPath('documents')
    });
    if (paths && paths.length > 0) {
      API.saveWechatFilePath(paths[0]);
      toast('路径设置成功！');
      renderConfigBar();
    }
  } catch (e) {
    toast('设置失败：' + e.message, 3000);
  }
}

// ========== 初始化 ==========
(function init() {
  // 设置面板高度
  if (window.utools && utools.whole) {
    utools.whole.setExpendHeight(420);
  }
  renderConfigBar();
  renderAccounts();
})();
</script>
</body>
</html>
